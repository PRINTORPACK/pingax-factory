<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Order Form - Pingax Industries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1edf7; font-family: sans-serif; }
        .form-container { max-width: 700px; margin: 40px auto; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background: white; }
        .form-label { font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 4px; }
        .form-control, .form-select { border-radius: 6px; border: 1px solid #ced4da; padding: 8px 12px; font-size: 0.9rem; color: #333; }
        .btn-purple { background-color: #7B57CB; color: white; border-radius: 8px; font-weight: bold; font-size: 0.95rem; }
        .btn-purple:hover { background-color: #6342A5; color: white; }
        .btn-back { border: 1px solid #ced4da; background: white; border-radius: 6px; color: #555; padding: 6px 12px; }
    </style>
</head>
<body>

    <div class="container form-container">
        <div class="card p-4">
            
            <div class="d-flex align-items-center mb-4">
                <a href="/" class="btn-back me-3"><i class="fas fa-arrow-left"></i></a>
                <h4 class="mb-0" style="color: #7B57CB;"><i class="fas fa-file-medical me-2"></i> New Order Form</h4>
            </div>

            <form method="POST" action="/create-order">
                <div class="row g-3">
                    
                    <div class="col-md-6">
                        <label class="form-label">Client Name</label>
                        <input name="client" class="form-control" placeholder="e.g. Shree Balaji Tradelink" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Customer Contact No.</label>
                        <input name="contact" class="form-control" placeholder="e.g. 9825012345">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Product / Order Item</label>
                        <input name="product" class="form-control" placeholder="e.g. Luxury Shopping Bags" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Size (Dimensions)</label>
                        <input name="size" class="form-control" placeholder="e.g. 12x16x4 inch">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Quantity</label>
                        <input name="qty" class="form-control" placeholder="e.g. 5000" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Paper GSM / Quality</label>
                        <input name="gsm" class="form-control" placeholder="e.g. 170 GSM Art Paper">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Colour Type</label>
                        <select name="colour_type" class="form-select">
                            <option>Single Colour</option>
                            <option>Multi Colour</option>
                            <option>Special Colour</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Printing Side</label>
                        <select name="printing_side" class="form-select">
                            <option>Outside Only</option>
                            <option>Inside Only</option>
                            <option>Both Sides</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Special Process</label>
                        <select name="process" class="form-select">
                            <option>None (Plain)</option>
                            <option>UV Coating</option>
                            <option>Drip-off Gloss/Matt</option>
                            <option>Matt Lamination</option>
                            <option>Gloss Lamination</option>
                            <option>Foil Stamping (Gold/Silver)</option>
                            <option>Embossing</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Order Date</label>
                        <input type="date" name="order_date" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Required Date</label>
                        <input type="date" name="required_date" class="form-control">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Remarks</label>
                        <textarea name="remarks" class="form-control" rows="3" placeholder="Enter remarks here..."></textarea>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Brought By (Staff)</label>
                        <input name="staff" class="form-control" placeholder="Staff Name" required>
                    </div>

                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-purple w-100 py-2 text-uppercase">Save Order</button>
                    </div>

                </div>
            </form>

        </div>
    </div>

</body>
</html>
