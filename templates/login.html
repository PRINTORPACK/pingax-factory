<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pingax Industries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f3f8; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-purple { background-color: #4A148C; color: white; border: none; }
        .btn-purple:hover { background-color: #6A1B9A; color: white; }
    </style>
</head>
<body>

    <div class="login-card">
        <h4 class="text-center mb-4" style="color: #4A148C; font-weight: 800;">PINGAX LOGIN</h4>
        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-purple w-100">Login to Dashboard</button>
        </form>
    </div>

</body>
</html>
