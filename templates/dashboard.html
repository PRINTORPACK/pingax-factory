<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pingax Industries - Live Tracking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f3f8; font-family: sans-serif; }
        .navbar-custom { background: #6A1B9A; color: white; padding: 15px 25px; font-weight: 600; }
        .btn-purple { background-color: #6A1B9A !important; color: white !important; font-weight: 700; border: none; }
        .stat-card { background: white; border-radius: 12px; padding: 20px; border-top: 4px solid #6A1B9A; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: #6A1B9A; }
        .order-card { background: white; border-radius: 12px; padding: 20px; border-left: 5px solid #6A1B9A; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .action-icon { color: #6A1B9A; margin-left: 10px; cursor: pointer; text-decoration: none; }
        .status-badge { background: #f3e5f5; color: #6A1B9A; font-weight: 700; padding: 3px 10px; border-radius: 5px; font-size: 0.8rem; }
        .notes-text { color: #d32f2f; font-size: 0.85rem; font-style: italic; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="navbar-custom">PINGAX INDUSTRIES</div>

    <div class="container-fluid mt-4">
        <div class="row g-3 mb-4">
            <div class="col-md-3"><div class="stat-card"><div class="text-muted small">TOTAL HISTORY</div><div class="stat-value">{{ orders|length }}</div></div></div>
            <div class="col-md-3"><div class="stat-card"><div class="text-muted small">ACTIVE ORDERS</div><div class="stat-value">{{ orders|length }}</div></div></div>
        </div>

        <div class="row">
            {% for o in orders %}
            <div class="col-md-4">
                <div class="order-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="badge bg-light text-dark">#PI-100{{ o.id }}</span>
                        <div>
                            <a href="/edit-order/{{ o.id }}" class="action-icon"><i class="fas fa-pencil-alt"></i></a>
                            <a href="/delete-order/{{ o.id }}" class="action-icon" onclick="return confirm('Delete this?')"><i class="fas fa-trash-alt"></i></a>
                        </div>
                    </div>
                    
                    <h5 class="fw-bold">{{ o.client }}</h5>
                    {% if o.notes %}<div class="notes-text"><i class="fas fa-sticky-note"></i> {{ o.notes }}</div>{% endif %}
                    
                    <div class="row mb-3">
                        <div class="col-6 small">Item: <strong>{{ o.product }}</strong></div>
                        <div class="col-6 small">Qty: <strong>{{ o.qty }}</strong></div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center bg-light p-2 rounded">
                        <span class="small">Staff: <strong>{{ o.order_by }}</strong></span>
                        <form action="/update" method="POST" style="margin:0;">
                            <input type="hidden" name="id" value="{{ o.id }}">
                            <select name="status" onchange="this.form.submit()" class="form-select form-select-sm">
                                <option value="Design" {% if o.status == 'Design' %}selected{% endif %}>Design</option>
                                <option value="Printing" {% if o.status == 'Printing' %}selected{% endif %}>Printing</option>
                                <option value="Lamination" {% if o.status == 'Lamination' %}selected{% endif %}>Lamination</option>
                                <option value="Completed" {% if o.status == 'Completed' %}selected{% endif %}>Completed</option>
                            </select>
                        </form>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
