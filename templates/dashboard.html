<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pingax Industries - Live Tracking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f3f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        /* Uniform Purple Theme */
        .navbar-custom { background: #6A1B9A; color: white; padding: 16px 24px; font-weight: 600; }
        .btn-purple { background-color: #6A1B9A !important; color: white !important; font-weight: 700; border: none; }
        .btn-purple:hover { background-color: #4A148C !important; }
        .bg-purple { background-color: #6A1B9A !important; }
        .text-purple { color: #6A1B9A !important; }
        
        .stat-card { background: white; border-radius: 12px; padding: 20px; border-top: 4px solid #6A1B9A; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .stat-value { font-size: 2rem; font-weight: 800; color: #6A1B9A; }
        
        .order-card-premium { background: white; border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.05); padding: 22px; border-left: 6px solid #6A1B9A; margin-bottom: 24px; }
        .order-id { background-color: #f3e5f5; color: #6A1B9A; font-size: 0.75rem; font-weight: 700; padding: 5px 10px; border-radius: 6px; }
        .status-badge { font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 6px; color: #6A1B9A; background: #f3e5f5; text-transform: uppercase; }
        .client-title { font-size: 1.35rem; font-weight: 700; color: #1A1A1A; margin-bottom: 5px; }
        .notes-text { font-size: 0.85rem; color: #d32f2f; font-style: italic; margin-bottom: 12px; font-weight: 600; }
        .grid-info-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; background: #fafafa; padding: 12px; border-radius: 8px; }
        .staff-row { background-color: #f8f7fa; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .action-icon { color: #6A1B9A; font-size: 0.95rem; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="navbar-custom">PINGAX INDUSTRIES</div>

    <div class="container-fluid mt-4">
        <div class="row g-3 mb-4">
            <div class="col-md-4"><div class="stat-card"><div class="text-muted small">TOTAL HISTORY</div><div class="stat-value">{{ orders|length }}</div></div></div>
            <div class="col-md-4"><div class="stat-card"><div class="text-muted small">ACTIVE ORDERS</div><div class="stat-value">{{ orders|length }}</div></div></div>
        </div>

        <div class="row">
            {% for o in orders %}
            <div class="col-md-4">
                <div class="order-card-premium">
                    <div class="d-flex justify-content-between mb-3">
                        <div>
                            <span class="order-id">#PI-100{{ o.id }}</span>
                            <a href="/edit-order/{{ o.id }}" class="action-icon"><i class="fas fa-pencil-alt"></i></a>
                            <a href="/delete-order/{{ o.id }}" class="action-icon" onclick="return confirm('Delete this?')"><i class="fas fa-trash-alt"></i></a>
                        </div>
                        <span class="status-badge">{{ o.status }}</span>
                    </div>

                    <div class="client-title">{{ o.client }}</div>
                    {% if o.notes %}<div class="notes-text"><i class="fas fa-sticky-note"></i> {{ o.notes }}</div>{% endif %}

                    <div class="grid-info-box">
                        <div class="small">Item: <strong>{{ o.product }}</strong></div>
                        <div class="small">Qty: <strong>{{ o.qty }}</strong></div>
                    </div>

                    <div class="staff-row">
                        <span class="small">Staff: <strong>{{ o.order_by }}</strong></span>
                        <form action="/update" method="POST" style="margin:0;">
                            <input type="hidden" name="id" value="{{ o.id }}">
                            <select name="status" onchange="this.form.submit()" class="form-select form-select-sm" style="width: auto;">
                                <option value="Design" {% if o.status == 'Design' %}selected{% endif %}>Design</option>
                                <option value="Printing" {% if o.status == 'Printing' %}selected{% endif %}>Printing</option>
                                <option value="Lamination" {% if o.status == 'Lamination' %}selected{% endif %}>Lamination</option>
                            </select>
                        </form>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
